<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PICO-Z Web</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column;
    justify-content: center; align-items: center; min-height: 100vh;
    font-family: -apple-system, sans-serif; color: #fff; }
  #screen { image-rendering: pixelated; image-rendering: crisp-edges;
    width: 512px; height: 512px; display: none; }
  #loader { text-align: center; }
  #loader.hidden { display: none; }
  #loader p { color: #888; font-size: 14px; margin-bottom: 20px; }
  #open-btn { background: #29ADFF; color: #000; border: none; padding: 10px 28px;
    border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
  #open-btn:hover { opacity: 0.85; }
  #file-input { display: none; }
  #error { color: #f55; font-size: 13px; margin-top: 12px; display: none; }
</style>
</head>
<body>
<div id="loader">
  <p>PICO-Z Web Player</p>
  <button id="open-btn">Open Cart</button>
  <input type="file" id="file-input" accept=".p8,.png,.p8.png">
  <p style="color:#666;font-size:12px;margin-top:16px;line-height:1.5">
    Open a .p8 or .p8.png cart file. Try <a href="https://www.lexaloffle.com/bbs/?tid=2145" style="color:#29ADFF">Celeste Classic</a><br>
    or browse the <a href="https://www.lexaloffle.com/bbs/?cat=7" style="color:#29ADFF">PICO-8 BBS</a> for games.
  </p>
  <div id="error"></div>
</div>
<canvas id="screen" width="128" height="128"></canvas>

<script>
let wasm, ctx, imageData, audioCtx, audioNode;
function getMemBuf() { return wasm.memory.buffer; }
const mem = { get buffer() { return wasm ? wasm.memory.buffer : new ArrayBuffer(0); } };
let buttons = [0, 0];
let running = false;

const KEY_MAP = {
  ArrowLeft:  [0, 0x01], ArrowRight: [0, 0x02], ArrowUp: [0, 0x04], ArrowDown: [0, 0x08],
  z: [0, 0x10], c: [0, 0x10], n: [0, 0x10],
  x: [0, 0x20], v: [0, 0x20], m: [0, 0x20],
  s: [1, 0x01], f: [1, 0x02], e: [1, 0x04], d: [1, 0x08],
  Tab: [1, 0x10], q: [1, 0x10], w: [1, 0x20],
};

// LLVM WASM SjLj runtime — implements setjmp/longjmp via JS exceptions.
// LLVM's -wasm-enable-sjlj pass transforms C setjmp/longjmp into calls to
// these runtime functions. longjmp throws a JS exception; setjmp sites use
// try/catch blocks (inserted by LLVM) to catch them.
function sjljRuntime() {
  // setjmp table: maps jmp_buf address -> {label, table}
  const setjmpTable = new Map();
  let nextLabel = 1;

  return {
    __wasm_setjmp: (buf, label, table) => {
      // Store setjmp state: the label ID tells LLVM which setjmp site was hit
      const view = new DataView(mem.buffer);
      view.setUint32(buf, nextLabel, true);
      setjmpTable.set(buf, { label: nextLabel, table });
      nextLabel++;
    },
    __wasm_longjmp: (buf, val) => {
      // Throw a special exception that will be caught by LLVM's generated catch blocks
      throw { __wasm_sjlj: true, buf, val: val || 1 };
    },
    __wasm_setjmp_test: (buf, table) => {
      // Called after catching an exception to check if it matches this setjmp site
      const entry = setjmpTable.get(buf);
      if (!entry) return 0;
      return entry.label;
    },
  };
}

// Minimal WASI stubs — Lua's C code links against WASI but we only need
// fd_write (for printh/debug output), clock_time_get, and random_get to
// actually work; the rest just have to be callable.
function wasiStubs() {
  const EBADF = 8;
  const ENOENT = 44;
  const ENOSYS = 52;
  return {
    environ_sizes_get: (count_ptr, size_ptr) => {
      const view = new DataView(mem.buffer);
      view.setUint32(count_ptr, 0, true);
      view.setUint32(size_ptr, 0, true);
      return 0;
    },
    environ_get: () => 0,
    clock_res_get: (id, out_ptr) => {
      const view = new DataView(mem.buffer);
      view.setBigUint64(out_ptr, 1000n, true); // 1µs resolution
      return 0;
    },
    clock_time_get: (id, precision, out_ptr) => {
      const view = new DataView(mem.buffer);
      const ns = BigInt(Math.floor(performance.now() * 1e6));
      view.setBigUint64(out_ptr, ns, true);
      return 0;
    },
    random_get: (buf_ptr, buf_len) => {
      const bytes = new Uint8Array(mem.buffer, buf_ptr, buf_len);
      crypto.getRandomValues(bytes);
      return 0;
    },
    fd_write: (fd, iovs_ptr, iovs_len, nwritten_ptr) => {
      const view = new DataView(mem.buffer);
      let written = 0;
      let text = '';
      for (let i = 0; i < iovs_len; i++) {
        const ptr = view.getUint32(iovs_ptr + i * 8, true);
        const len = view.getUint32(iovs_ptr + i * 8 + 4, true);
        text += new TextDecoder().decode(new Uint8Array(mem.buffer, ptr, len));
        written += len;
      }
      if (fd === 1 || fd === 2) console.log(text.trimEnd());
      view.setUint32(nwritten_ptr, written, true);
      return 0;
    },
    fd_read: () => EBADF,
    fd_pread: () => EBADF,
    fd_pwrite: () => EBADF,
    fd_close: () => 0,
    fd_seek: () => EBADF,
    fd_sync: () => 0,
    fd_readdir: () => EBADF,
    fd_fdstat_get: (fd, buf) => {
      const view = new DataView(mem.buffer);
      view.setUint8(buf, 4); // regular file
      view.setUint16(buf + 2, 0, true);
      view.setBigUint64(buf + 8, 0n, true);
      view.setBigUint64(buf + 16, 0n, true);
      return 0;
    },
    fd_fdstat_set_flags: () => 0,
    fd_filestat_get: () => EBADF,
    fd_filestat_set_size: () => EBADF,
    fd_filestat_set_times: () => EBADF,
    fd_prestat_get: () => EBADF,
    fd_prestat_dir_name: () => EBADF,
    fd_renumber: () => EBADF,
    path_open: () => ENOENT,
    path_create_directory: () => ENOSYS,
    path_filestat_get: () => ENOENT,
    path_filestat_set_times: () => ENOENT,
    path_link: () => ENOSYS,
    path_readlink: () => ENOSYS,
    path_remove_directory: () => ENOSYS,
    path_rename: () => ENOSYS,
    path_symlink: () => ENOSYS,
    path_unlink_file: () => ENOSYS,
    poll_oneoff: () => ENOSYS,
    proc_exit: (code) => { console.log('proc_exit:', code); throw new Error('proc_exit ' + code); },
  };
}

function openFile() {
  document.getElementById('file-input').click();
}

async function init() {
  // Wire UI immediately so button works even if WASM fails
  document.getElementById('open-btn').addEventListener('click', openFile);
  document.getElementById('file-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) file.arrayBuffer().then(buf => loadCart(new Uint8Array(buf)));
  });
  document.addEventListener('dragover', (e) => e.preventDefault());
  document.addEventListener('dragenter', (e) => e.preventDefault());
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    e.stopPropagation();
    const file = e.dataTransfer.files[0];
    if (file) file.arrayBuffer().then(buf => loadCart(new Uint8Array(buf)));
  });
  setupInput();

  // Load WASM
  try {
    const response = await fetch('pico-z.wasm');
    const result = await WebAssembly.instantiateStreaming(response, {
      wasi_snapshot_preview1: wasiStubs(),
      env: sjljRuntime(),
    });
    wasm = result.instance.exports;
    const canvas = document.getElementById('screen');
    ctx = canvas.getContext('2d');
    imageData = ctx.createImageData(128, 128);
  } catch(e) {
    showError('WASM load failed: ' + e.message);
    console.error(e);
  }
}

function loadCart(bytes) {
  const err_el = document.getElementById('error');
  err_el.style.display = 'none';

  const ptr = wasm.web_alloc(bytes.length);
  if (!ptr) { showError('Failed to allocate memory'); return; }

  new Uint8Array(mem.buffer, ptr, bytes.length).set(bytes);
  const err = wasm.web_init(ptr, bytes.length);
  wasm.web_free(ptr, bytes.length);

  if (err !== 0) { showError('Failed to load cart'); return; }

  document.getElementById('loader').classList.add('hidden');
  document.getElementById('screen').style.display = 'block';
  document.getElementById('screen').focus();

  if (!audioCtx) setupAudio();
  const wasRunning = running;
  running = true;
  lastFrameTime = 0;
  if (!wasRunning) requestAnimationFrame(frame);
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

let lastFrameTime = 0;
let indicatorEnd = 0; // timestamp when indicator should stop

function frame(timestamp) {
  if (!running) return;
  const fps = wasm.web_get_fps();
  const interval = 1000 / fps;

  if (timestamp - lastFrameTime >= interval - 1) {
    lastFrameTime = timestamp;
    wasm.web_set_buttons(0, buttons[0]);
    wasm.web_set_buttons(1, buttons[1]);
    wasm.web_update();

    const bufPtr = wasm.web_get_pixel_buffer();
    const px = new Uint8Array(mem.buffer, bufPtr, 128 * 128 * 4);
    const rgba = imageData.data;
    for (let i = 0; i < 128 * 128; i++) {
      rgba[i * 4 + 0] = px[i * 4 + 2]; // R
      rgba[i * 4 + 1] = px[i * 4 + 1]; // G
      rgba[i * 4 + 2] = px[i * 4 + 0]; // B
      rgba[i * 4 + 3] = 255;
    }

    // Draw save/load indicator: 2px border cycling through colors
    if (timestamp < indicatorEnd) {
      const PALETTE = [
        [0,0,0],[29,43,83],[126,37,83],[0,135,81],
        [171,82,54],[95,87,79],[194,195,199],[255,241,232],
        [255,0,77],[255,163,0],[255,236,39],[0,228,54],
        [41,173,255],[131,118,156],[255,119,168],[255,204,170]
      ];
      const ci = Math.floor((indicatorEnd - timestamp) / 50) % 16;
      const [cr, cg, cb] = PALETTE[ci];
      for (let y = 0; y < 128; y++) {
        for (let x = 0; x < 128; x++) {
          if (x < 2 || x >= 126 || y < 2 || y >= 126) {
            const j = (y * 128 + x) * 4;
            rgba[j] = cr; rgba[j+1] = cg; rgba[j+2] = cb; rgba[j+3] = 255;
          }
        }
      }
    }

    ctx.putImageData(imageData, 0, 0);
  }
  requestAnimationFrame(frame);
}

function setupAudio() {
  audioCtx = new AudioContext();
  const actualRate = audioCtx.sampleRate; // browser's native rate (e.g. 48000)
  const synthRate = 22050; // our synth's sample rate
  const ratio = synthRate / actualRate;

  const node = audioCtx.createScriptProcessor(2048, 0, 1);
  node.onaudioprocess = (e) => {
    const out = e.outputBuffer.getChannelData(0);
    // Generate the right number of synth samples, then resample
    const needed = Math.ceil(out.length * ratio);
    const ptr = wasm.web_generate_audio(needed);
    const src = new Float32Array(mem.buffer, ptr, needed);
    for (let i = 0; i < out.length; i++) {
      out[i] = src[Math.min(Math.floor(i * ratio), needed - 1)];
    }
  };
  node.connect(audioCtx.destination);
  audioNode = node;
}

function saveStateToStorage() {
  if (!wasm) return;
  const len = wasm.web_save_state();
  if (len === 0) return;
  const ptr = wasm.web_get_save_ptr();
  if (!ptr) return;
  const bytes = new Uint8Array(mem.buffer, ptr, len);
  // Encode as base64 for localStorage
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  try {
    localStorage.setItem('pico-z-save', btoa(binary));
  } catch(e) { console.warn('Save failed:', e); }
  wasm.web_free_save();
}

function loadStateFromStorage() {
  if (!wasm) return;
  const b64 = localStorage.getItem('pico-z-save');
  if (!b64) return;
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const ptr = wasm.web_alloc(bytes.length);
  if (!ptr) return;
  new Uint8Array(mem.buffer, ptr, bytes.length).set(bytes);
  wasm.web_load_state(ptr, bytes.length);
  wasm.web_free(ptr, bytes.length);
}

function setupInput() {
  document.addEventListener('keydown', (e) => {
    const m = KEY_MAP[e.key];
    if (m) { buttons[m[0]] |= m[1]; e.preventDefault(); }
    // Save/load state
    if (e.key === 'p' || e.key === 'P') { saveStateToStorage(); indicatorEnd = performance.now() + 2000; e.preventDefault(); }
    if (e.key === 'l' || e.key === 'L') { loadStateFromStorage(); indicatorEnd = performance.now() + 2000; e.preventDefault(); }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  });
  document.addEventListener('keyup', (e) => {
    const m = KEY_MAP[e.key];
    if (m) { buttons[m[0]] &= ~m[1]; e.preventDefault(); }
  });
}

init();
</script>
</body>
</html>
