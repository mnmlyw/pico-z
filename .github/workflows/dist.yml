name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-zig
        with:
          version: 0.15.2
      - name: Run tests
        run: zig build test

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-zig
        with:
          version: 0.15.2

      - name: Build all platforms
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            ./build.sh "${{ github.ref_name }}"
          else
            ./build.sh
          fi

      - name: Build WASM
        run: zig build -Dweb

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: pico-z-distributables
          path: |
            dist/*.zip
            web/pico-z.wasm

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
