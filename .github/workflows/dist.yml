name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Run tests
        run: zig build test

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0

      - name: Build all platforms
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            ./build.sh "${{ github.ref_name }}"
          else
            ./build.sh
          fi

      - name: Build WASM
        run: zig build -Dweb

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: pico-z-distributables
          path: |
            dist/*.zip
            web/pico-z.wasm

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip

  # Keep docs/play (the GH Pages-served web player) in sync with web/.
  # GH Pages publishes from main:/docs, but builds happen against web/, so
  # the two would silently drift unless we copy on every main push.
  pages-sync:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Build WASM
        run: zig build -Dweb
      - name: Sync docs/play with latest web build
        run: |
          cp web/index.html docs/play/index.html
          cp web/pico-z.wasm docs/play/pico-z.wasm
          if git diff --quiet docs/play/; then
            echo "docs/play already in sync"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/play/
          git commit -m "CI: sync docs/play from web build [skip ci]"
          git push
